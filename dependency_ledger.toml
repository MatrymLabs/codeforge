# Dependency ledger -- every dependency earns its place (frameless Python).
#
# The Dependency Approval Rule (docs/tooling_strategy.md) made machine-checkable: every
# runtime and dev dependency declared in pyproject.toml MUST have a justification row here,
# or `make deps` fails. Each row answers three of the eight approval questions in the form
# that outlives a PR description: why we need it, what stdlib option was weighed, and how
# removable it is. Adding a dependency without a row here is the gate's whole point to catch.
#
# Keys are PEP 503-normalized package names (lowercase, hyphens): `bandit[toml]` -> `bandit`.

# ----- runtime dependencies (ship inside the wheel) -----------------------------------

[runtime.pyyaml]
why = "Parse and validate the YAML seed files; the world is data, loaded through our own gates."
stdlib_alternative = "None; there is no YAML parser in the standard library and hand-rolling one is not worth it."
removable = "Only by changing the seed format (e.g. to JSON/TOML), which the loader gate abstracts."

[runtime.sqlalchemy]
why = "Typed, migration-friendly persistence for accounts and characters behind parts/db.py."
stdlib_alternative = "sqlite3 (stdlib) works, but hand-written SQL loses the typed models and schema laws."
removable = "The db seam (parts/db.py) is the only caller; a sqlite3 backend could replace it."

[runtime.fastapi]
why = "The read-only admin/HTTP surface with owner-account auth and typed request handling."
stdlib_alternative = "http.server (stdlib) exists but has no routing, validation, or auth ergonomics."
removable = "The admin API is an optional surface; the MUD engine runs without it."

[runtime.uvicorn]
why = "ASGI server that actually runs the FastAPI admin app."
stdlib_alternative = "None at the ASGI layer; wsgiref is WSGI-only and synchronous."
removable = "Removed together with FastAPI if the HTTP surface is dropped."

[runtime.websockets]
why = "The browser gateway speaks WebSocket to the in-page terminal."
stdlib_alternative = "None; implementing the WebSocket handshake and framing by hand is error-prone."
removable = "Only the browser gate depends on it; the TCP gateway does not."

[runtime.pydantic]
why = "Typed, validated models: the API request/response contract (documented in OpenAPI) and the Settings environment catalog (parts/config.py). Already a transitive dependency of FastAPI; now declared and used directly."
stdlib_alternative = "dataclasses + hand-written validation exist, but lose the JSON-schema/OpenAPI generation and coercion FastAPI relies on."
removable = "Not while FastAPI is used (it depends on pydantic); the direct uses (config, response models) would fall back to dataclasses + manual validation."

[runtime.structlog]
why = "Structured (JSON) request logging on the HTTP surface (parts/observability.py): one queryable event per request, not a prose line. An observability signal employers name."
stdlib_alternative = "logging (stdlib) with a custom JSON formatter works, but loses structlog's context binding, processor pipeline, and ergonomics; more boilerplate for the same result."
removable = "Yes; only parts/observability.py imports it. The MUD engine and tick never log through it; the HTTP surface would fall back to stdlib logging."

[runtime.psycopg]
why = "Optional (extra 'postgres'): the PostgreSQL driver SQLAlchemy uses when DATABASE_URL points at Postgres. Not installed by default; SQLite (stdlib) stays the dev/test backend."
stdlib_alternative = "sqlite3 (stdlib) is the default backend and needs no driver; Postgres is a production capability with no stdlib client."
removable = "Yes; it is an optional extra. codeforge core runs on SQLite without psycopg; the db seam (parts/db.py) chooses the backend from DATABASE_URL."

[runtime.anthropic]
why = "Optional (extra 'ai'): the Claude-backed Architect brain, behind the Advisor seam in parts/architect.py. Not installed by default; one API key away from live."
stdlib_alternative = "None; there is no stdlib LLM client, and the wire protocol is a vendor API. The seam (Advisor protocol) keeps it swappable and testable with a fake."
removable = "Yes; it is an optional extra. The local rule-based Architect is the default and needs no dependency, so codeforge core runs without anthropic."

# ----- dev dependencies (quality gates, never shipped) --------------------------------

[dev.ruff]
why = "Lint and format in one fast tool; the quality gate in make fix/lint and CI."
stdlib_alternative = "None; there is no stdlib linter/formatter."
removable = "Yes; it is a dev-time gate, not runtime. Replaceable by Black+isort+Flake8 (worse)."

[dev.mypy]
why = "Static type checking; enforces the typing discipline that make check gates on."
stdlib_alternative = "None; typing is in stdlib but there is no stdlib type checker."
removable = "Yes; dev-time only. Pyright is an alternative if ever needed."

[dev.types-pyyaml]
why = "Type stubs so mypy understands the pyyaml calls; no runtime effect."
stdlib_alternative = "None; stubs are inherently third-party."
removable = "Yes; removed if pyyaml is removed or mypy is dropped."

[dev.pytest]
why = "The test runner for the whole suite; proves every part with acceptance and refusal cases."
stdlib_alternative = "unittest (stdlib) works but pytest's fixtures and parametrization are far cleaner."
removable = "Migratable to unittest with effort; the tests are the asset, not the runner."

[dev.pytest-cov]
why = "Coverage measurement folded into the test run; gates the coverage threshold."
stdlib_alternative = "coverage.py directly (still third-party); no stdlib coverage tool exists."
removable = "Yes; dev-time only. coverage.py could be invoked standalone."

[dev.pytest-xdist]
why = "Parallelize the test suite across cores; the suite is ~95% of make check's runtime (measured 18.3s serial -> 15.0s on 4 cores)."
stdlib_alternative = "None; neither stdlib nor pytest core runs tests in parallel across processes."
removable = "Yes; dev-time only. Tests still run serially without the -n flag (the inner-loop `make test` stays serial)."

[dev.pip-audit]
why = "Scans installed dependencies for known CVEs; the make audit gate and CI supply-chain check."
stdlib_alternative = "None; CVE data and matching are inherently external."
removable = "Yes; dev/CI-time only."

[dev.bandit]
why = "Static security scan (SAST) of our own source; catches unsafe patterns before CI."
stdlib_alternative = "None; there is no stdlib SAST."
removable = "Yes; dev/CI-time only. CodeQL provides a deeper GitHub-native scan alongside it."

[dev.detect-secrets]
why = "Baselined secret scanning so a credential never reaches git; the make secrets gate."
stdlib_alternative = "None; entropy/heuristic secret detection is not in stdlib."
removable = "Yes; dev/CI-time only. gitleaks/trufflehog are alternatives (redundant)."

[dev.cyclonedx-bom]
why = "Generates the CycloneDX SBOM (supply-chain evidence, SSDF) as a build artifact."
stdlib_alternative = "None; SBOM formats and dependency graph resolution are external."
removable = "Yes; dev/CI-time only."

[dev.hypothesis]
why = "Property-based tests (make property) that assert laws across generated inputs, not just examples."
stdlib_alternative = "None; stdlib has no property-testing engine."
removable = "Yes; example-based tests remain if it is dropped, losing the generative coverage."

[dev.httpx2]
why = "Test client for exercising the FastAPI admin surface without a live network."
stdlib_alternative = "http.client (stdlib) works but lacks the ASGI transport that tests the app in-process."
removable = "Yes; test-only. Removed if the HTTP surface is dropped."

[dev.alembic]
why = "Schema migrations for the SQLAlchemy models (migrations/); `alembic upgrade head` builds the PostgreSQL schema and versions future changes. Ops/dev tooling, not a runtime import."
stdlib_alternative = "None; there is no stdlib migration tool. create_all covers the SQLite dev path but does not version or evolve a production schema."
removable = "Yes; dev/ops-time only. The SQLite default runs without it (create_all); Postgres deployments use it."

[dev.mkdocs-material]
why = "Builds the docs/ tree into the public documentation site (GitHub Pages). Docs-build tooling; never imported by the app."
stdlib_alternative = "None sensible; hand-writing an HTML docs site generator is not worth it. The Markdown docs remain readable on GitHub without it."
removable = "Yes; docs-build only. The repo and its Markdown docs work without the published site."

[dev.playwright]
why = "End-to-end browser tests for the live HTMX dashboard (e2e/), driving real Chromium against the running app. Test tooling; never imported by the app or the main suite."
stdlib_alternative = "None; there is no stdlib headless browser. Route-level tests (httpx TestClient) cover the API, but only a browser proves the HTMX behavior end to end."
removable = "Yes; test-only, isolated in e2e/ and its own CI job. `make check` and the app run without it."
