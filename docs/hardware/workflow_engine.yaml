part_id: workflow-engine
name: Workflow Engine
version: "0.1"
maturity: beta
purpose: >
  Drive any lifecycle defined as data: role-gated moves between states, a recorded
  history trail, and named effects the caller applies.
source: parts/shelf/workflow.py
domain: orchestration
inputs: >
  a workflow definition (states, steps with roles/guards/effects, terminal states)
  + an Instance + an event + an actor role
outputs: >
  a Fired(dst, effect) or Refusal(reason); a mutated local Instance with history
interfaces:
  - build_workflow
  - WorkflowEngine.open
  - WorkflowEngine.actions
  - WorkflowEngine.advance
  - WorkflowEngine.is_done
dependencies:
  - parts.shelf.statemachine
security: >
  never mutates world state; effects are names the caller applies;
  role gating refuses before firing
tests:
  - tests/test_workflow.py
  - tests/test_quest.py
  - tests/test_onboarding.py
license: MIT
source_status: original
owner: MatrymLabs
adapters:
  - parts/quest.py
  - parts/onboarding.py
