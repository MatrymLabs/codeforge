# SEED: aethryn -- rooms.yaml
# The flagship world (docs/world_bible.md): the Kindlands Coast, where the Age of
# Rekindling begins. Everything here was Forged and can be reforged.
# Same gates as any seed: lowercase_snake_case labels, exits must resolve.
# The FIRST room is the spawn (START_ROOM), by convention -- no hardcoded start.

template:
  desc: The Kindlands lie under a low, warm sky, the light of a world that was made.

the_waking_shore:
  name: The Waking Shore
  desc: |-
    You wake on cold sand with no memory of the craft. A single ember gutters
    at the tideline, nearly out. When your hand nears it, it flares and holds.
    Something in you answers it. A path of packed cinder leads north into town.
  exits:
    north: cinderhearth_square

cinderhearth_square:
  name: Cinderhearth Square
  desc: |-
    The heart of Cinderhearth-on-Reach. The town forge, cold for a generation,
    has just taken flame again, and folk gather to watch it burn. A training
    dummy stands ready in the yard, and a cellar door yawns beneath the forge.
  exits:
    south: the_waking_shore
    north: old_reach_bridge
    east: reachwood_edge
    down: cold_cellar

old_reach_bridge:
  name: The Old Reach Bridge
  desc: |-
    A stone bridge over the Reach, its center plank long rotted through. Reforge
    it and the road north opens; the world remembers what you mend. Beyond lies
    the Ember-road, and somewhere down it, the capital.
  exits:
    south: cinderhearth_square
    north: the_far_reach

reachwood_edge:
  name: The Reachwood Edge
  desc: |-
    Where the town gives way to wild forest. Ember grows strange and bright in
    the undergrowth here, and not everything in the trees is friendly.
  exits:
    west: cinderhearth_square

the_far_reach:
  name: The Far Reach
  desc: |-
    The Ember-road runs on toward Emberreach, City of the Relit Forge, and the
    Warden Gate that guards the way to the Great Spiral. A road-warden waits at
    the marker, watching who comes. The road climbs north, and it is not gentle.
  exits:
    south: old_reach_bridge
    north: emberroad_climb

cold_cellar:
  name: The Cold Cellar
  desc: |-
    Beneath the forge, a sundered making-hall the Unforging left half-real. Its
    rooms hold the steps of a simple Forge, jumbled out of their proper order.
    Cold air breathes up from a stair descending into the dark.
  exits:
    up: cinderhearth_square
    down: cellar_hearth

cellar_hearth:
  name: The Cellar Hearth
  desc: |-
    A ruined forge-hall around a dead central hearth. At the anvil stands the
    Cinder-Wight, an old smith the Unforging never let finish dying. A crack in
    the far wall breathes colder still, downward, toward the Cinderdeep.
  exits:
    up: cold_cellar
    down: cinderdeep_descent

# --- The Ember-road: the climb from the Kindlands Coast up to Emberreach. ---
# The old paved Forgework connecting capitals (world bible s.22). The Kindlands are behind
# you; the road foes here run levels ~10-13, a real step up from the coast. Fight up, or fall.

emberroad_climb:
  name: The Ember-road
  desc: |-
    The paved Forgework of the Ember-road climbs north out of the Kindlands, its
    old cinder-stones still warm underfoot. Wild ember has gone feral in the ditches,
    and stray things move where the light of Cinderhearth no longer reaches. A hollow
    opens to the east; the road runs on north toward a wayfarer's rest.
  exits:
    south: the_far_reach
    north: wayfarers_rest
    east: strayfire_hollow

strayfire_hollow:
  name: Strayfire Hollow
  desc: |-
    A blind dell off the road where feral ember pools and burns without a maker.
    Reavers of the road den here, drawn to the wild fire. It is no place to linger
    unproven, but the bold have taken good steel off the dead.
  exits:
    west: emberroad_climb

wayfarers_rest:
  name: A Wayfarer's Rest
  desc: |-
    A walled waystation on the Ember-road, its brazier kept lit for travellers by
    old Concord custom. The walls hold the strayfire back; here you can breathe.
    The road climbs the last stretch north to the gates of Emberreach.
  exits:
    south: emberroad_climb
    north: emberreach_gates

# --- Emberreach, City of the Relit Forge (world bible s.25): large, safe, service-dense. ---
# No foes inside the walls -- this is the mid-game hub: the Grand Forge, the Orders' Row,
# the Market Quarter, and the Warden Gate that teases the road up the Great Spiral.

emberreach_gates:
  name: The Gates of Emberreach
  desc: |-
    The great cinder-iron gates of Emberreach stand open under banners of the Relit
    Forge. A gate-warden of the Concord greets the road-weary. Beyond the arch the
    capital hums with the work of the Rekindling: the Grand Forge burns to the north.
  exits:
    south: wayfarers_rest
    north: the_grand_forge

the_grand_forge:
  name: The Grand Forge
  desc: |-
    The heart of Emberreach: the great relit Forge roars in the city center, and the
    Church of the First Flame keeps its light. The city's Loremaster works here, at the
    root of the world's memory. The Orders' Row lies west, the Market Quarter east, and
    the Warden Gate stands to the north.
  exits:
    south: emberreach_gates
    west: orders_row
    east: market_quarter
    north: warden_gate

orders_row:
  name: The Orders' Row
  desc: |-
    A colonnade of guild-halls: the Making, the Gathering, the Warcraft, and the Knowing
    Orders keep their doors here, where a Forger chooses a road and trains a craft. A
    recruiter watches the street for new talent come up from the coast.
  exits:
    east: the_grand_forge

market_quarter:
  name: The Market Quarter
  desc: |-
    Stalls and shopfronts crowd the Market Quarter, and the Cooling-Sea docks send their
    trade up from the water. A trader calls her wares over the din. Everything the wider
    Anvil makes passes through here sooner or later.
  exits:
    west: the_grand_forge

warden_gate:
  name: The Warden Gate
  desc: |-
    The Concord's seat and the threshold of the Wardenmarch: beyond this gate the
    Ember-road climbs to the Coilfoot Range and the first Coils of the Great Spiral.
    A Warden Sentinel of grey Forgework bars the arch, and the gate-keeper watches
    to see if you are the Forger who can put it down. This is the Warden's test.
  exits:
    south: the_grand_forge
    north: the_wardenmarch

# --- The Wardenmarch and the First Coil of the Great Spiral (world bible s.20, s.24). ---
# Past the Warden's test the megadungeon ascent begins: an endless climb of Coils, one
# Gate-boss per floor. The first Coil runs levels ~18-22 -- true above-Emberreach danger.

the_wardenmarch:
  name: The Wardenmarch
  desc: |-
    Beyond the gate the Concord's own country: watch-cairns and old Forgework mark the
    road to the Coilfoot Range, where the Great Spiral lifts out of the world. The air
    thins and hums. Emberreach is behind you now. The ascent is ahead, and up.
  exits:
    south: warden_gate
    north: coilfoot_ascent

coilfoot_ascent:
  name: The Coilfoot Ascent
  desc: |-
    The base of the first Coil, where the Great Spiral's lowest stair winds up into cloud.
    Loose ember-wisps drift off the old Forgework, half-alive and hostile to the living.
    The stair climbs up; the Wardenmarch lies back to the south.
  exits:
    south: the_wardenmarch
    up: coil_first_landing

coil_first_landing:
  name: The First Coil Landing
  desc: |-
    A wide forged landing on the first Coil, ringed by cold ascent-lamps. At its center
    a Forgewraith keeps the stair -- the first Gate-boss of the Spiral, made of the wrath
    the Unforging left behind. Past it the stair climbs on, up into the Second Coil.
  exits:
    down: coilfoot_ascent
    up: coil_second_ascent

# --- The Second Coil of the Great Spiral (world bible s.24): the ascent climbs, levels ~24-28. ---
# Higher than the first Coil, colder, and hungrier. Its Gate-boss, the Ashlord, keeps the stair.

coil_second_ascent:
  name: The Second Coil Ascent
  desc: |-
    The stair narrows as the Second Coil lifts higher into the Spiral's cold. Revenants of
    fallen climbers walk the forged steps, grey and unfinished, mistaking the living for
    the way home. The First Coil falls away below; the stair climbs on toward a bridgespan.
  exits:
    down: coil_first_landing
    up: coil_bridgespan

coil_bridgespan:
  name: The Coil Bridgespan
  desc: |-
    A slender Forgework bridge arcs between two turns of the Spiral, ascent-lamps guttering
    along its rail above a fall with no bottom. An Ashen Sentinel walks the span, and there
    is no room to go around. Beyond it the stair reaches the Second Coil's landing.
  exits:
    down: coil_second_ascent
    up: coil_second_landing

coil_second_landing:
  name: The Second Coil Landing
  desc: |-
    A high forged landing where the Second Coil's cold burns blue. The Ashlord holds the
    stair here -- a Gate-boss grown from a Forge-master the Unforging turned to ash and will.
    The way further up the Spiral is sealed in grey light, and waits for another day.
  exits:
    down: coil_bridgespan

# --- The Cinderdeep (world bible: the downward branch). The coast's OTHER road: down from the ---
# cellar hearth instead of north up the Ember-road. A mid-band depths dungeon (levels ~10-15),
# a parallel to the early road -- a Forger chooses to climb the Spiral or delve the deep.

cinderdeep_descent:
  name: The Cinderdeep Descent
  desc: |-
    The crack in the hearth-wall opens into a throat of cold stone winding down below the
    coast. This is the Cinderdeep: where the Unforging's damage ran deepest and the old
    making-works drowned. Deep-crawlers ward the dark. The hearth is back up the way you came.
  exits:
    up: cellar_hearth
    down: sunken_forgeworks

sunken_forgeworks:
  name: The Sunken Forgeworks
  desc: |-
    A drowned making-hall, its anvils under black water and its lamps long cold. Drowned
    makers still move at their benches, hammering work that will never set. A vein of dead
    ember runs off to the east; the descent goes on, down, into deeper cold.
  exits:
    up: cinderdeep_descent
    east: the_cold_vein
    down: cinderdeep_maw

the_cold_vein:
  name: The Cold Vein
  desc: |-
    A seam of dead ember threads the rock here, grey and starless, and something has made
    a lair of it. A lurker of the vein feeds on what warmth strays this deep. The only way
    on is back west to the forgeworks.
  exits:
    west: sunken_forgeworks

cinderdeep_maw:
  name: The Cinderdeep Maw
  desc: |-
    The deep bottoms out in a cold maw of ruined Forgework. Here the Hollow Smith keeps its
    dead anvil -- a maker the Unforging emptied and never let stop. Below it the Cinderdeep
    goes deeper still, into dark the coast has no map for. That way is not open yet.
  exits:
    up: sunken_forgeworks
