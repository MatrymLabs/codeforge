# SEED: aethryn -- npcs.yaml
# hp > 0 makes an NPC attackable; xp is awarded on defeat; atk > 0 makes it strike back.
# Labels generate names ('reach_wolf' -> "the reach wolf") and keywords.

wren:
  name: Wren the Smith
  location: cinderhearth_square
  keywords: [wren, smith, shopkeeper, merchant]
  dialogue:
    - '"The old forge relit the day you washed ashore. Coincidence? In the Kindlands, nothing is."'
    - '"Blades, cloaks, a good wrench -- everything a new Forger needs. Ask and I will make it."'
    - '"That bridge north has been broken for years. Gather ember, and you could mend it yourself."'

sela:
  name: Sela the Loremaster
  location: cinderhearth_square
  keywords: [sela, loremaster, scholar, elder]
  dialogue:
    - '"Everything you see was Forged from ember. What was made can be remade -- that is the first law."'
    - '"Long ago the greatest work of all, the First Seed, was sundered. We call it the Unforging."'
    - '"You can hold ember and give it lasting shape. That makes you a Forger. It also makes you dangerous."'

training_dummy:
  location: cinderhearth_square
  keywords: [dummy, training, straw]
  dialogue:
    - '"..." The dummy says nothing. Struck down, it quietly reassembles itself. Things here are made.'
  hp: 20
  xp: 30

reach_wolf:
  name: a reach wolf
  location: reachwood_edge
  keywords: [wolf, reach, beast]
  dialogue:
    - The wolf bares its teeth, eyes bright with wild ember.
  hp: 15
  atk: 3  # a real fight; it strikes back (the training-ground failsafe still catches a fall)
  level: 3  # a modest step above a fresh Forger: full reward now, worth nothing once you outclass it
  tier: normal

road_warden:
  name: the Road-Warden
  location: the_far_reach
  keywords: [warden, road, guard, marshal]
  dialogue:
    - '"So the coast is relit. Word travels fast on the Ember-road. Emberreach lies north, Forger."'
    - '"The road climbs hard from here, and the strayfire dens run thick. Go proven, or go home."'
    - '"At the capital you will choose your Order and your road. The Warden Gate tests the rest."'

cinder_wight:
  name: the Cinder-Wight
  location: cellar_hearth
  keywords: [wight, cinder, smith, boss]
  dialogue:
    - '"COLD... SO COLD..." The old smith lifts a hammer of grey cinder. It never finished dying.'
  hp: 50
  atk: 7  # the tutorial dungeon boss; learn its pattern, or reforge it rather than break it
  level: 8  # a real gulf above the wolves: a boss-tier reward for closing it
  tier: boss  # x10 the level's base reward -- the climax of the Kindlands arc pays for the climb
  aggressive: true  # it never finished dying: strikes on the world beat (leash releases if you stop)
  lethal: true  # a real boss: fall to it and you wake in town while it recovers, no failsafe revive
  drops: [cinder_hammer]  # felled, the old smith yields its grey-cinder hammer (object instancing)
  loot: {ember_shard: 2, nothing: 3}  # and, by chance, a shard of the wild ember it hoarded

# --- The Ember-road foes (level-banded: level+tier scale the reward by the challenge gap). ---
# hp/atk are tuned for pacing; level/tier feed parts.shelf.reward_curve. A coast-fresh Forger
# (level ~5-6) fights UP here, so a kill pays well -- but the road can put you down.

cinder_stray:
  name: a cinder stray
  location: emberroad_climb
  keywords: [stray, cinder, beast, feral]
  dialogue:
    - The cinder stray circles, wild ember guttering along its spine.
  hp: 40
  atk: 6
  aggressive: true  # feral: it opens the fight on the world beat (leash releases if you disengage)
  level: 10
  tier: normal
  drops: [ember_shard]  # feral ember clings to it: a shard for the taking

road_reaver:
  name: a road reaver
  location: strayfire_hollow
  keywords: [reaver, road, brigand, raider]
  dialogue:
    - '"Toll''s gone up, coast-rat. Steel or ember -- your pick which you leave."'
  hp: 70
  atk: 11
  aggressive: true
  level: 13
  tier: elite  # a real threat: elite pays x3 the level''s base -- the road''s best return
  drops: [reaver_blade]
  loot: {ember_shard: 2, nothing: 2}

# --- Emberreach: the safe capital hub (world bible s.25). Peaceful service NPCs. ---

emberreach_warden:
  name: the Gate-Warden of Emberreach
  location: emberreach_gates
  keywords: [warden, gate, guard, concord]
  dialogue:
    - '"Up from the coast, and still breathing. Welcome to Emberreach, City of the Relit Forge."'
    - '"The Grand Forge burns north. The Orders keep their Row to the west, the Market to the east."'

grandforge_loremaster:
  name: Master Ilya, the Loremaster
  location: the_grand_forge
  keywords: [ilya, loremaster, master, scholar]
  dialogue:
    - '"Sela sent word of you from the coast. The First Flame remembers every Forger who relights it."'
    - '"The Great Archive holds what the world was. The Grand Forge makes what it will be. Study both."'
    - '"The Unforging sundered the First Seed. Every ember you carry is a piece of the answer."'

order_recruiter:
  name: a recruiter of the Orders
  location: orders_row
  keywords: [recruiter, orders, guild, order]
  dialogue:
    - '"Four Orders keep the Row: the Making, the Gathering, the Warcraft, the Knowing. Choose well."'
    - '"A Forger without an Order is a spark without a hearth. Train a craft; earn your place."'

market_trader:
  name: a Market-Quarter trader
  location: market_quarter
  keywords: [trader, merchant, market, shopkeeper]
  dialogue:
    - '"Cooling-Sea goods, coast-craft, Spiral salvage -- if the Anvil makes it, it crosses my stall."'
    - '"Ember-shards fetch a fair price up here. The road pays those who survive it, eh?"'

warden_keeper:
  name: the Keeper of the Warden Gate
  location: warden_gate
  keywords: [keeper, warden, gate, wardenmarch]
  dialogue:
    - '"Beyond this arch: the Wardenmarch, the Coilfoot Range, and the first Coils of the Great Spiral."'
    - '"The Sentinel is the test, Forger. Put the grey guardian down and the ascent is yours to climb."'
    - '"Many come up from the coast sure of their spark. The Sentinel has cooled most of them. Prove it."'

# --- The Warden's Test and the First Coil (level-banded bosses: the ascent's real danger). ---
# These run well above Emberreach. Bosses are lethal (fall and you wake in town, no failsafe) and
# boss-tier (x10 reward): felling one pays for the whole climb to it.

warden_sentinel:
  name: the Warden Sentinel
  location: warden_gate
  keywords: [sentinel, warden, guardian, grey]
  dialogue:
    - The Sentinel's grey Forgework grinds awake, and cold light kindles in its eye-slit.
  hp: 90
  atk: 14
  aggressive: true  # it bars the arch: it strikes the moment you present yourself for the test
  lethal: true  # the Warden's test is real: fall and you wake in Emberreach while it reforms
  level: 17
  tier: boss  # the gate-boss of the Warden's test -- x10 the level's base reward
  drops: [warden_sigil]  # felled, it yields the Concord sigil that marks a proven Forger

spiral_wisp:
  name: an ember-wisp
  location: coilfoot_ascent
  keywords: [wisp, ember, spiral, wraithfire]
  dialogue:
    - The ember-wisp gutters closer, half-alive and hungry for a maker's warmth.
  hp: 45
  atk: 9
  aggressive: true
  level: 18
  tier: normal
  drops: [ember_shard]

gate_forgewraith:
  name: the Coil Forgewraith
  location: coil_first_landing
  keywords: [forgewraith, wraith, coil, gate]
  dialogue:
    - '"YOU CLIMB... INTO WHAT WAS UNMADE..." The Forgewraith rises in a column of grey fire.'
  hp: 120
  atk: 18
  aggressive: true
  lethal: true
  level: 22
  tier: boss  # the first Gate-boss of the Great Spiral: the ascent's first true wall
  drops: [coil_keystone]
  loot: {ember_shard: 3, nothing: 2}
