# SEED: aethryn -- quest.yaml (the region's story arc, as data)
# The Relighting (world bible, "The First Story Arc"): reforge the Old Reach Bridge, delve the Cold
# Cellar, and end the cold at the cellar hearth. After you ACCEPT, it plays itself from real actions:
# walk onto the broken bridge to reforge it, step into the Cold Cellar to delve, and fell the
# Cinder-Wight to end it. The `quest <event>` verb stays a fallback if you take the beats out of order.

id: the_relighting
name: The Relighting
start: offered
reward_xp: 120

steps:
  - {state: offered,       event: accept,  to: accepted}
  - {state: accepted,      event: reforge, to: bridge_mended, on_enter: old_reach_bridge, effect: "open_door:reach_bridge"}
  - {state: bridge_mended, event: delve,   to: at_the_hearth, on_enter: cold_cellar}
  - {state: at_the_hearth, event: face,    to: done, on_defeat: cinder_wight, effect: award_xp}

terminal: [done]

labels:
  offered: "Sela speaks of the Relighting: the coast's ember has gone cold and the Old Reach Bridge lies broken. Will you rekindle the coast? (quest accept)"
  accepted: "You take up the Relighting. Carry your spark NORTH onto the Old Reach Bridge -- the span will remember how to hold."
  bridge_mended: "The bridge is reforged; the Ember-road north lies open. Now DELVE the Cold Cellar (down from the square) and end the cold at its hearth."
  at_the_hearth: "The Cinder-Wight stands at the cellar hearth -- an old smith the Unforging never let finish. FACE it, if your spark is strong enough."
  done: |-
    *** THE RELIGHTING IS COMPLETE ***
    The Cinder-Wight lays down its grey hammer at last, and the cellar hearth flares gold.
    The cold that gripped Cinderhearth-on-Reach for a generation breaks. Bells ring in the
    square above; the town forge roars back to full flame; the Ember-road to Emberreach lies
    open, and the Warden Gate waits beyond for a Forger who has proven their spark.
    You have relit the coast. Well forged.
