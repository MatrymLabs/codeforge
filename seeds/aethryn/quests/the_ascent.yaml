# SEED: aethryn -- quests/the_ascent.yaml (the second arc: the road up the Great Spiral)
# The Ascent plays itself from real deeds, past the Relighting: fell the Warden Sentinel to earn
# the ascent, then climb the Great Spiral Coil by Coil, besting each Gate-boss, to the second
# landing. The `quest the_ascent <event>` verb stays a fallback if you take the beats out of order.

id: the_ascent
name: The Ascent
start: unproven
reward_xp: 500

steps:
  - {state: unproven,    event: prove,  to: proven,      on_defeat: warden_sentinel,  effect: award_xp}
  - {state: proven,      event: climb,  to: first_coil,  on_enter: coil_first_landing}
  - {state: first_coil,  event: fell,   to: coil_won,    on_defeat: gate_forgewraith, effect: award_xp}
  - {state: coil_won,    event: ascend, to: second_coil, on_enter: coil_second_landing}
  - {state: second_coil, event: crown,  to: ascended,    on_defeat: gate_ashlord,     effect: award_xp}

terminal: [ascended]

labels:
  unproven: "The Warden Gate bars the way to the Great Spiral. Prove your spark: put the Warden Sentinel down."
  proven: "The Sentinel is fallen; the ascent is open. Climb the Coilfoot stair onto the first Coil of the Spiral."
  first_coil: "You stand on the first Coil. Its Gate-boss, the Forgewraith, keeps the stair. Best it to climb on."
  coil_won: "The first Coil is yours. The stair winds higher, up the Second Coil toward its landing."
  second_coil: "The Second Coil's landing burns blue-cold. The Ashlord holds the stair -- the last wall of the climb."
  ascended: |-
    *** THE ASCENT IS WON ***
    The Ashlord's blue fire gutters out, and two Coils of the Great Spiral lie conquered below
    you. The Spiral climbs on above, Coil beyond Coil, toward the Forge at its summit -- but you
    have proven the Warden's road and taken the first true measure of the ascent. Well climbed,
    Forger. The rest of the Spiral is a story yet to be forged.
