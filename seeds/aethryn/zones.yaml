# Areas of aethryn: named groups of rooms with a reset policy (the world is data).
# reset_mode: never (grouping only) | empty_only (refill when unoccupied) | always.
# The reset SCHEDULER rides the world beat; the repop action is deferred by design
# (see parts/zones.py and research/legacy_muds/behavior_specs/zone_reset.md).

kindlands_coast:
  name: The Kindlands Coast
  rooms: [the_waking_shore, reachwood_edge, the_far_reach]
  reset_mode: empty_only
  beats_between: 12

cinderhearth:
  name: Cinderhearth
  rooms: [cinderhearth_square, old_reach_bridge]
  reset_mode: never
  beats_between: 20

cold_cellar:
  name: The Cold Cellar
  rooms: [cold_cellar, cellar_hearth]
  reset_mode: always
  beats_between: 8

ember_road:
  name: The Ember-road
  rooms: [emberroad_climb, strayfire_hollow, wayfarers_rest]
  reset_mode: empty_only  # the road's strayfire and reavers repopulate once the stretch is quiet
  beats_between: 10

emberreach:
  name: Emberreach, City of the Relit Forge
  rooms: [emberreach_gates, the_grand_forge, orders_row, market_quarter, warden_gate]
  reset_mode: never  # a living capital, not a repop field: its NPCs and shops persist
  beats_between: 20

wardenmarch:
  name: The Wardenmarch
  rooms: [the_wardenmarch]
  reset_mode: never  # Concord country: a threshold, not a repop field
  beats_between: 20

great_spiral_coil_1:
  name: The Great Spiral - First Coil
  rooms: [coilfoot_ascent, coil_first_landing]
  reset_mode: empty_only  # the ascent's wisps and Gate-boss reform once the Coil is quiet
  beats_between: 14

great_spiral_coil_2:
  name: The Great Spiral - Second Coil
  rooms: [coil_second_ascent, coil_bridgespan, coil_second_landing]
  reset_mode: empty_only  # the Coil's revenants and Gate-boss reform once the stair is quiet
  beats_between: 14

cinderdeep:
  name: The Cinderdeep
  rooms: [cinderdeep_descent, sunken_forgeworks, the_cold_vein, cinderdeep_maw]
  reset_mode: empty_only  # the deep's crawlers and its Hollow Smith reform once the delve is quiet
  beats_between: 12

great_spiral_coil_3:
  name: The Great Spiral - Third Coil
  rooms: [coil_third_ascent, coil_stormreach, coil_third_landing]
  reset_mode: empty_only  # the storm's husks and its Stormlord reform once the Coil is quiet
  beats_between: 16
