# SEED: first-forge -- items.yaml
# Same conventions as rooms.yaml: labels are identity, names are display.
# Write plain room labels here (location: library); the engine tags
# them internally. An item's name and keywords GENERATE from its label
# unless you override them -- 'copper_key' becomes "a copper key"
# findable by: copper key / copper / key.

copper_key:
  location: library

rusty_lantern:
  location: workshop

# An equippable weapon (Engineer-flavored). Balance is prototype.
forge_wrench:
  name: a modular forge wrench
  keywords: [wrench, forge wrench, forge]
  location: workshop
  slot: weapon
  mods: {ATK: 6, ACC: 3}

healing_draught:
  name: a healing draught
  keywords: [draught, healing, potion, heal]
  location: courtyard
  consume: {hp: 20}
