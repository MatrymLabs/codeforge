# Starter callings for The First Forge.
# Seed convention: top-level keys ARE the labels; 'template' is reserved.

template:
  description: A path not yet described.

vanguard:
  name: Vanguard
  description: Front-line protector. Strength and stamina carry the day.
  stats: {strength: 14, speed: 8, stamina: 12, magic: 4}

scholar:
  name: Scholar
  description: Seeker of the old words. The mind is the sharpest blade.
  stats: {strength: 5, speed: 8, stamina: 8, magic: 14}

artificer:
  name: Artificer
  description: Builder of clever things. Balanced hands, curious eyes.
  stats: {strength: 9, speed: 12, stamina: 9, magic: 9}

# Engineer: the JRPG reference job. A tactical support and control class -- repair,
# devices, diagnostics, interrupts -- not a renamed spellcaster. Stat balance is prototype.
engineer:
  name: Engineer
  description: Battlefield mechanic and systems operator. Repairs, deploys, diagnoses, controls.
  stats: {strength: 10, speed: 12, magic: 8, stamina: 11, wisdom: 13, luck: 9}
  role_tags: [support, control, technical]
  automatic_attack: Calibrated Strike
  abilities: [Diagnostic Scan, Field Repair, System Interrupt, Deploy Barrier]
  counter: Emergency Repair
  movement: Field Deployment
  inherent: Systems Thinking
  signature: Forge Overdrive
  # Prototype resistance profile: grounded and hardened, but electronics dislike lightning.
  resistances: {LGT: Weak, ERT: Resist, PSN: Resist, WND: Resist}
  # Power Cells: the Engineer's custom resource, spent to deploy devices, regained per tick.
  power_cells: 6
  power_regen: 1
  # Milestone perks: passive bonuses unlocked in order at each TP milestone. Prototype balance.
  milestone_perks:
    - {name: Reinforced Frame, target: DEF, amount: 4}
    - {name: Targeting Suite, target: ACC, amount: 5}
    - {name: Overcharged Servos, target: ATK, amount: 4}
