# ============================================================
# SEED: first-forge -- rooms.yaml
# The starter world. Edit this file and the world changes.
# No Python required.
# ============================================================
#
# NAMING CONVENTIONS
#   label  : the YAML key. lowercase_snake_case, unique, permanent.
#            Machines use labels: exits, saves, scripts, code.
#   name   : human display text. Change it anytime; nothing breaks.
#
# THE ROOM TEMPLATE (everything is a room)
#   Every room is born complete. Merge order, rightmost wins:
#     engine defaults  ->  template: block below  ->  the room's own fields
#   Engine defaults: name is generated from the label
#   ("guard_tower" -> "Guard Tower"), desc gets a placeholder,
#   exits default to empty.
#
#   A bare label is a valid room:
#     attic:
#
# THE GATES (what the loader refuses)
#   - labels that aren't lowercase_snake_case  (suggests the fix)
#   - duplicate labels                          (YAML would silently overwrite)
#   - exits pointing at rooms that don't exist  (names the dangling edge)
# ============================================================

template:
  desc: The forge's silence hangs here, waiting for a builder's touch.

forge:
  name: The Cold Forge
  desc: |-
    You stand beside a cold forge beneath unfamiliar stars.
    A brass plaque on the anvil reads: "Every world begins as a spark."
  exits:
    north: courtyard
    down: cellar

courtyard:
  name: Broken Courtyard
  desc: Cracked flagstones stretch under a violet sky. Wind hums through the ruins.
  exits:
    south: forge
    east: library

library:
  name: The Old Library
  desc: Dust drifts between towering shelves. An oak door in the back is sealed shut.
  exits:
    west: courtyard
    north: archive
    east: classroom

classroom:
  name: The Classroom of Practical Arts
  desc: |-
    Dark wooden desks face a slate board of diagrams, code fragments, and glowing
    question marks. Shelves of lesson scrolls line the walls — Python, Git,
    Finance, Records, Compliance. This is where knowledge becomes usable skill.
    -- Here: talk codex, lesson list, lesson start <subject>, question,
       answer <A-D>, hint, progress.
  exits:
    west: library

archive:
  name: The Sealed Archive
  desc: |-
    Forbidden shelves climb into darkness, but the air has changed: this is the
    records office. Stamped forms, ledgers, and archive crystals preserve what
    happened, when, and who approved it — including the federal guidance CodeForge
    builds against. The Archivist tends the preserved documents.
    -- Here: regs (list guidance), regs nist (NIST SP 800-171/172/218), regs <id> (read one),
       library (preserved documents), library <id> (read a document), talk archivist.
  exits:
    south: library

cellar:
  name: The Forge Cellar
  desc: Cool darkness. Crates of unworked ore line the walls, waiting for a purpose.
  exits:
    up: forge
    west: workshop

workshop:
  name: The Forge Workshop
  desc: |-
    Your engineering cockpit. Blueprint rails, a diagnostics panel, and the
    hardware-catalog counter orbit a central workbench; the Architect's chair
    hums, ready. Every system begins here before it becomes part of the world.
    -- Here: workshop (tools), ai <prompt> (the Architect). Rooms ring you:
       the Vault (w), the Console (s), the Observatory (n), the Blueprint (e).
  exits:
    north: observatory
    east: blueprint_table
    west: component_vault
    south: diagnostic_console
    down: cellar

observatory:
  name: The Observatory
  desc: |-
    A domed glass ceiling frames constellations shaped like systems, modules,
    and quests. A telescope points not at space but at possible futures — where
    CodeForge dreams before it builds.
    -- Here: ai <prompt> to think through what to build next. Long-range
       planning (the Starwright) is coming.
  exits:
    south: workshop

blueprint_table:
  name: The Blueprint Table
  desc: |-
    A vast table glows with layered plans — rooms, commands, workflows, and
    ledgers as movable diagrams. Nothing here is built by accident; every idea
    becomes a plan before it becomes code.
    -- Here: blueprint (draft a plan) is coming; for now, ai <prompt> to
       reason one through.
  exits:
    west: workshop

component_vault:
  name: The Component Vault
  desc: |-
    Shelves of tested parts recede into shadow: gates, ledgers, validators,
    command relays. Each is tagged for reuse across games, government, finance,
    compliance, and records — the CodeForge hardware store.
    -- Here: catalog (browse), reuse <term> (search, e.g. reuse audit).
  exits:
    east: workshop

diagnostic_console:
  name: The Diagnostic Console
  desc: |-
    A reinforced console blinks amber and blue. Each command is carved into a
    metal plate and routed through a failsafe — not a raw terminal, a guarded
    station where every run is checked, capped, and logged.
    -- Here: diagnostics (quick checks), run <check>, security (SAST scan),
       console (the full list).
  exits:
    north: workshop
