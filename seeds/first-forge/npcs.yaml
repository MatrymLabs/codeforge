# SEED: first-forge -- npcs.yaml
# Labels generate names ('librarian' -> "the librarian") and keywords.
# Dialogue cycles one line per talk, then loops.

librarian:
  location: library
  keywords: [librarian, keeper, woman]
  dialogue:
    - '"Welcome to the old library. Mind the dust -- it remembers things."'
    - '"That oak door? Sealed for years. A copper key went missing ages ago..."'
    - '"If you ever stand inside the Archive, tell no one what you read."'

training_dummy:
  location: courtyard
  keywords: [dummy, training]
  dialogue:
    - '"..." The dummy says nothing. It is, after all, a dummy.'
  hp: 20
  xp: 30

professor_codex:
  name: Professor Codex
  location: classroom
  keywords: [codex, professor, instructor]
  dialogue:
    - '"The Library tells you what is true. This room tests whether you can use it. Try `lesson list`."'
