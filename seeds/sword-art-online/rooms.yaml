# SEED: sword-art-online -- rooms.yaml
# A whole new game type on the same engine. Aincrad, Floor 1.
# Same gates as any seed: lowercase_snake_case labels, exits must resolve.

template:
  desc: Aincrad's seamless iron sky hangs overhead, cold and endless.

town_of_beginnings:
  name: The Town of Beginnings
  desc: |-
    A vast plaza of white stone beneath a floating iron sky.
    Ten thousand players once spawned here. A notice board reads:
    "Clear all 100 floors to log out. There is no other way."
  exits:
    north: teleport_gate
    east: black_iron_palace

black_iron_palace:
  name: The Black Iron Palace
  desc: |-
    The Monument of Life. Every player's name is etched in iron here,
    and struck through the moment they fall in the game -- and out of it.
  exits:
    west: town_of_beginnings

teleport_gate:
  name: The Teleport Gate
  desc: A ring of blue light hums at the town's edge -- the only road to the labyrinth.
  exits:
    south: town_of_beginnings
    north: floor_labyrinth

floor_labyrinth:
  name: The First-Floor Labyrinth
  desc: Twisting black corridors. Kobolds skitter in the dark toward the chamber ahead.
  exits:
    south: teleport_gate
    up: boss_chamber

boss_chamber:
  name: The Boss Chamber
  desc: A cathedral of black stone. On the throne waits Illfang, the Kobold Lord.
  exits:
    down: floor_labyrinth
