# SEED: spiral-ascent -- npcs.yaml
# hp > 0 makes an NPC attackable; xp is awarded on defeat; atk > 0 makes it strike back.

wayfitter:
  name: the Wayfitter
  location: spiral_landing
  keywords: [wayfitter, smith, merchant, shopkeeper]
  dialogue:
    - '"Blades, tokens, a warm cloak -- everything a climber needs for the ascent."'
    - '"A party is forming for the first Gate. You in?"'

coilwarden:
  name: the Coilwarden
  location: gate_chamber
  keywords: [coilwarden, warden, boss, gate]
  dialogue:
    - '"NONE ASCEND UNPROVEN." The Coilwarden lifts a scarred greatblade.'
  hp: 60
  xp: 200
  atk: 8  # the Gate boss strikes back; come prepared (the training-ground failsafe still catches a fall)
