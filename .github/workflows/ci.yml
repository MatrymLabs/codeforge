name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      # uv (Rust, parallel resolver) installs the dependency set far faster than pip.
      # CI-only tooling; not a runtime or pyproject dependency. Installs into the
      # setup-python interpreter via --system.
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0

      # The pinned graph must match pyproject.toml: editing dependencies without
      # re-running `uv lock` fails here, loud, before anything installs (<1s).
      - name: Verify uv.lock is current
        run: uv lock --check

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      # `make check` folds coverage into a single suite run (lint · types · pytest --cov
      # · threshold) and writes coverage.xml -- no separate coverage step needed.
      - name: Run the gates (check = lint · types · tests+coverage)
        run: make check

      # Upload coverage to Codecov. Non-blocking: a Codecov outage or a missing
      # token must never turn the portfolio's build red. Public repo uploads work
      # tokenless; set the CODECOV_TOKEN secret for higher rate limits.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7
        continue-on-error: true
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # Blocking gate: audit the RUNTIME dependency set (what actually ships) and fail on
      # any known CVE, upholding the "zero unresolved high/critical dependency vulns" law.
      # A documented exception uses `pip-audit --ignore-vuln <ID>` with a reason.
      - name: Runtime dependency CVE gate
        run: make audit-runtime

      # Informational, non-blocking: pip-audit scans the WHOLE environment, so an
      # unrelated CVE in build tooling (pip/setuptools) surfaces without turning the
      # build red. Review its output; the runtime gate above is what blocks.
      - name: Dependency CVE audit (whole env, informational)
        run: make audit
        continue-on-error: true

      - name: Static security scan
        run: bandit -c pyproject.toml -r parts forge.py -q

      - name: Secret scan
        run: make secrets

      # SBOM (SSDF supply-chain evidence): generate a CycloneDX bill of materials and
      # keep it as a build artifact. Reproducible from this commit; non-blocking.
      - name: Software bill of materials (SBOM)
        run: make sbom
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sbom-cyclonedx
          path: reports/security/sbom.cdx.json
          if-no-files-found: warn

  # Proves the ORM + Alembic migrations work against a REAL PostgreSQL, not just SQLite.
  # The unit suite (check job) stays SQLite-isolated; this job is a focused integration
  # proof, so it is intentionally NOT a required check (it cannot deadlock a merge).
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: codeforge
          POSTGRES_PASSWORD: codeforge  # pragma: allowlist secret
          POSTGRES_DB: codeforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codeforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://codeforge:codeforge@localhost:5432/codeforge  # pragma: allowlist secret
      POSTGRES_TEST_URL: postgresql+psycopg://codeforge:codeforge@localhost:5432/codeforge  # pragma: allowlist secret
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
      - name: Install dependencies (with the postgres extra)
        run: uv pip install --system -e ".[dev,postgres]"
      - name: Build the schema with Alembic (upgrade head)
        run: alembic upgrade head
      - name: Prove the ORM round-trips on PostgreSQL
        run: pytest tests/test_postgres_integration.py -v

  # Drives the live HTMX dashboard with a real Chromium browser (isolated in e2e/, never in
  # `make check`). A focused front-to-back proof, so it is intentionally NOT a required check.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Install the Chromium browser (+ OS deps)
        run: python -m playwright install --with-deps chromium
      - name: Run the browser E2E suite
        run: pytest e2e -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - name: Build the image
        run: docker build -t codeforge:ci .
      - name: Smoke-test the container boots and serves
        run: |
          docker run -d --name cf -p 4000:4000 codeforge:ci
          sleep 5
          docker logs cf
          # The gateway announces itself once the seed loads and the socket binds.
          # If the seed files went missing or a part failed to import, this line
          # never prints and the job fails loud.
          docker logs cf 2>&1 | grep -q "listening on 0.0.0.0:4000"
          docker rm -f cf
      - name: Build the API image
        run: docker build -f Dockerfile.api -t codeforge-api:ci .
      - name: Smoke-test the API serves real evidence
        run: |
          docker run -d --name cfapi -p 8000:8000 codeforge-api:ci
          for i in $(seq 1 30); do curl -sf http://localhost:8000/health && break; sleep 1; done
          curl -sf http://localhost:8000/api/status | grep -q '"engine":"codeforge"'
          curl -sf http://localhost:8000/api/blueprints | grep -q 'npc_combat'
          docker rm -f cfapi

  # Proves the infrastructure-as-code (deploy/terraform/) is well-formed: format,
  # provider init, and validate. It does NOT apply (that needs a Docker daemon +
  # the published image); the live demo runs on Render via render.yaml.
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - name: Install Terraform
        run: |
          TF_VER=1.9.8
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o tf.zip "https://releases.hashicorp.com/terraform/${TF_VER}/terraform_${TF_VER}_linux_amd64.zip"
          unzip -o -q tf.zip -d "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Format check (all modules)
        run: terraform fmt -check -recursive deploy/terraform
      - name: Init + validate (local-docker module)
        working-directory: deploy/terraform
        run: |
          terraform init -backend=false
          terraform validate
      - name: Init + validate (render module)
        working-directory: deploy/terraform/render
        run: |
          terraform init -backend=false
          terraform validate
