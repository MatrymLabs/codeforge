name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      # uv (Rust, parallel resolver) installs the dependency set far faster than pip.
      # CI-only tooling; not a runtime or pyproject dependency. Installs into the
      # setup-python interpreter via --system.
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      # `make check` folds coverage into a single suite run (lint · types · pytest --cov
      # · threshold) and writes coverage.xml -- no separate coverage step needed.
      - name: Run the gates (check = lint · types · tests+coverage)
        run: make check

      # Upload coverage to Codecov. Non-blocking: a Codecov outage or a missing
      # token must never turn the portfolio's build red. Public repo uploads work
      # tokenless; set the CODECOV_TOKEN secret for higher rate limits.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7
        continue-on-error: true
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # Informational, non-blocking: pip-audit scans the whole environment, so an
      # unrelated CVE in build tooling (pip/setuptools) should surface without
      # turning the build red. Review its output; it does not gate the ritual.
      - name: Dependency CVE audit
        run: make audit
        continue-on-error: true

      - name: Static security scan
        run: bandit -c pyproject.toml -r parts forge.py -q

      - name: Secret scan
        run: make secrets

      # SBOM (SSDF supply-chain evidence): generate a CycloneDX bill of materials and
      # keep it as a build artifact. Reproducible from this commit; non-blocking.
      - name: Software bill of materials (SBOM)
        run: make sbom
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sbom-cyclonedx
          path: reports/security/sbom.cdx.json
          if-no-files-found: warn

  # Proves the ORM + Alembic migrations work against a REAL PostgreSQL, not just SQLite.
  # The unit suite (check job) stays SQLite-isolated; this job is a focused integration
  # proof, so it is intentionally NOT a required check (it cannot deadlock a merge).
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: codeforge
          POSTGRES_PASSWORD: codeforge  # pragma: allowlist secret
          POSTGRES_DB: codeforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codeforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://codeforge:codeforge@localhost:5432/codeforge  # pragma: allowlist secret
      POSTGRES_TEST_URL: postgresql+psycopg://codeforge:codeforge@localhost:5432/codeforge  # pragma: allowlist secret
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Install dependencies (with the postgres extra)
        run: uv pip install --system -e ".[dev,postgres]"
      - name: Build the schema with Alembic (upgrade head)
        run: alembic upgrade head
      - name: Prove the ORM round-trips on PostgreSQL
        run: pytest tests/test_postgres_integration.py -v

  # Drives the live HTMX dashboard with a real Chromium browser (isolated in e2e/, never in
  # `make check`). A focused front-to-back proof, so it is intentionally NOT a required check.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Install the Chromium browser (+ OS deps)
        run: python -m playwright install --with-deps chromium
      - name: Run the browser E2E suite
        run: pytest e2e -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Build the image
        run: docker build -t codeforge:ci .
      - name: Smoke-test the container boots and serves
        run: |
          docker run -d --name cf -p 4000:4000 codeforge:ci
          sleep 5
          docker logs cf
          # The gateway announces itself once the seed loads and the socket binds.
          # If the seed files went missing or a part failed to import, this line
          # never prints and the job fails loud.
          docker logs cf 2>&1 | grep -q "listening on 0.0.0.0:4000"
          docker rm -f cf
