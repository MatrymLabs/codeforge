name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run the ritual
        run: make check

      - name: Coverage report
        run: make coverage

      # Informational, non-blocking: pip-audit scans the whole environment, so an
      # unrelated CVE in build tooling (pip/setuptools) should surface without
      # turning the build red. Review its output; it does not gate the ritual.
      - name: Dependency CVE audit
        run: make audit
        continue-on-error: true

      - name: Static security scan
        run: bandit -c pyproject.toml -r parts forge.py -q
