- id: retry-policy
  name: Retry Policy
  source: parts/retry.py
  category: resilience
  tags: [retry, backoff, resilience, transient-fault, recovery]
  maturity: beta
  source_status: original
  license: MIT
  influence: "retry with exponential backoff (AWS Prescriptive Guidance; independently implemented)"
  experimental: >-
    add jitter, a deadline/cancellation token, or an async variant once workloads need them, or
    reach for a library like tenacity. Traded away (v1): jitter and cancellation, keeping the core
    pure, deterministic (injected sleep), and dependency-free.
  risk: low
  reuse_score: 4
  purpose: >
    Retry transient failures with exponential backoff, re-raise permanent ones and the final one
    (never swallowed). The sleep is injected, so the schedule and attempt count are deterministic.
    One core, two adapters: it auto-retries a flaky calibration in the game and an unreliable
    API/DB call in a practical app, with an attempt audit trail.
  reuse:
    game: "auto-retry a flaky calibration, asset load, or persistence write"
    finance: "retry a transient payment-gateway or ledger-service call, recorded as evidence"
    government: "resilient calls to a slow upstream registry or verification service"
    security: "bounded retries (no thundering herd); permanent auth failures never retried"
    general: "resilient API/DB/network calls with a bounded, backed-off attempt budget"

- id: circuit-breaker
  name: Circuit Breaker
  source: parts/circuit_breaker.py
  category: resilience
  tags: [circuit-breaker, resilience, fail-fast, state-machine, recovery]
  maturity: beta
  source_status: original
  license: MIT
  influence: "circuit breaker pattern (Azure resilience; independently implemented on state-machine)"
  experimental: >-
    add half-open concurrency control, rolling-window failure rates, or metrics hooks; or reach for
    a library (pybreaker, resilience4j). Traded away (v1): a rolling window and concurrency, keeping
    it a deterministic consecutive-failure breaker composed on our own state-machine part.
  risk: low
  reuse_score: 4
  purpose: >
    Fail fast when a dependency is broken: trip open after consecutive failures, reject calls
    immediately, and probe recovery after a reset timeout. Built ON the state-machine part (a part
    from a part). One core, two adapters: it protects a flaky relay in the game and an unreliable
    upstream service in a practical app.
  reuse:
    game: "a power relay that trips when it fails too often, then cools and re-tests"
    finance: "protect a flaky payment gateway or ledger service from cascading failures"
    government: "shield a public service from a slow or down upstream verification API"
    security: "contain a failing dependency so one broken service cannot take the system down"
    general: "wrap any unreliable API/DB/RPC call to fail fast and self-heal"

