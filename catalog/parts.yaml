# CodeForge Hardware Catalog - reusable parts across domains.
#
# One well-made part, many jobs. Each entry documents where the same engine
# code serves outside the game. Schema + rules: catalog/README.md.
# View it: `make hardware`. Validated by parts/hardware.py (fails loud on a bad row).
#
# The stance is architecture-first, not frameless-at-all-costs: our own architecture is the
# spine, and a framework earns its place when it proves a skill or does a job stdlib cannot.
# So each part records the ROAD NOT TAKEN - the deliberate alternative, whichever direction:
# a framework we declined (the early frameless parts), or the frameless path we declined
# (the later parts that adopt Pydantic, SQLAlchemy, structlog, an LLM SDK).

- id: rank-gate
  name: Rank Gate
  source: parts/ranks.py
  category: authorization
  tags: [rbac, permissions, security, governance]
  maturity: shipped
  source_status: original
  license: MIT
  influence: "RBAC - authorization-before-capability pattern (original implementation)"
  experimental: >-
    express it as FastAPI Depends(require_rank(...)) dependency
    injection, Django's permission framework, or a policy engine like Casbin/oso
    (RBAC as external policy data). Traded away: the plain, testable refusal path.
  risk: low
  purpose: >
    Authorization before capability: check an actor's rank against the rank a
    privileged action requires, and refuse before any of that action's code runs.
  reuse:
    game: "@-verbs gate on wizard/owner rank before they touch the world"
    government: "records access by clearance level; who may release a document"
    finance: "approval authority tiers - who may sign off an AP/AR transaction"
    compliance: "least-privilege enforcement, with the refusal as evidence"
    general: "role-based access control (RBAC) for any command surface"

- id: event-ledger
  name: Event Ledger
  source: parts/events.py
  category: messaging
  tags: [events, audit, fan-out, resilience]
  maturity: shipped
  source_status: original
  license: MIT
  influence: "publish/subscribe (observer) pattern (original implementation)"
  experimental: >-
    swap the in-process bus for blinker signals, or a broker
    (Redis pub/sub, RabbitMQ, Kafka) once fan-out must cross processes; Celery for
    durable delivery. Traded away: zero dependencies and in-test determinism.
  risk: low
  purpose: >
    Fan an event out to many subscribers, isolating failures: one dead or slow
    consumer can never fault the producer, and a raising sink is pruned.
  reuse:
    game: "broadcast room events (arrivals, speech) to every player present"
    government: "an append-only audit trail of who did what, when"
    finance: "a financial transaction / posting history feed"
    compliance: "a security-event log that survives a failing downstream sink"
    general: "a resilient pub/sub notification relay"

