- id: hash-chained-ledger
  name: Hash-Chained Ledger
  source: parts/hashchain.py
  category: data-integrity
  tags: [audit, integrity, tamper-evident, hash-chain, append-only, evidence]
  maturity: shipped
  source_status: original
  license: MIT
  influence: "Merkle / block-chain hash-linking + write-ahead log (original stdlib implementation)"
  experimental: >-
    for authenticity (WHO wrote it) sign the head hash (HMAC or asymmetric keys); to catch
    truncation of the newest records, anchor the head hash in a second store or a printed receipt;
    for high write volume or cross-process readers, back it with an append-only DB (SQLite WAL,
    Postgres) instead of a JSONL file. Traded away: zero dependencies and file-simple portability.
  risk: low
  purpose: >
    Append records to a file so any later edit, reorder, or deletion of a PAST record is detected
    on read: each entry hashes its own payload and the previous entry's hash. Fails loud on a
    broken chain rather than returning a dishonest history. stdlib only (hashlib + json). Harvested
    from the Chronicle (the ship's memory), which now shares this module's one canonical hash.
  proven_reuse: >-
    Demonstrated across the fleet, not just documented (harvested pattern, no code copied): the
    federal-guidance-library reuses it as a tamper-evident guidance-check ledger (`library ledger`),
    and ai-log-triage reuses it as a triage-decision audit trail (`GET /audit`, NIST AU-family). One
    part, three jobs in three repos.
  published: >-
    Published standalone on PyPI as `matrym-hashchain` (MIT, stdlib-only, CI on 3.10-3.13,
    trusted-publishing via OIDC): https://pypi.org/project/matrym-hashchain/  -  `pip install
    matrym-hashchain` then `import hashchain`. The first fleet part to leave the forge as an
    installable package.
  reuse:
    game: "the Chronicle records engine evidence, metrics, and incidents on this canonical hash"
    government: "federal-guidance-library records each guidance check tamper-evidently (library ledger) - a CMMC/NIST/NARA evidence trail"
    finance: "an append-only transaction or posting ledger with cryptographic integrity"
    compliance: "ai-log-triage records every triage decision on this pattern for AU-family audit integrity (GET /audit) - fails loud on tampering"
    general: "a dependency-free append-only event store that proves its own history was not rewritten"

- id: telnet-codec
  source: parts/telnet_codec.py
  name: Telnet Codec
  category: parsing
  tags: [telnet, protocol, iac, bytes, framing, negotiation, rfc854]
  maturity: beta
  source_status: original
  license: MIT
  influence: "Telnet RFC 854/855 command framing (original stdlib implementation)"
  experimental: >-
    add a streaming decoder that buffers a subnegotiation split across reads (today an unterminated
    frame is dropped to the end of the chunk), and a typed negotiation state table (which options
    are enabled) rather than a per-call reply read. Traded away (v1): stateful negotiation tracking,
    keeping four pure functions over bytes.
  risk: low
  purpose: >
    The Telnet wire codec in one place: the RFC 854/855 command bytes plus escaping a subnegotiation
    body (double IAC so a 0xFF payload byte cannot desync the client), stripping inbound IAC so a
    client's negotiation never corrupts a command line, and reading an option reply (DO/WILL enable,
    DONT/WONT refuse). Pure and socket-free, so the decode and encode sides of a connection share one
    source of truth instead of each re-declaring the constants. Extracted from the gateway and the
    GMCP card, which had duplicated it.
  reuse:
    game: "the MUD gateway strips inbound IAC and offers GMCP; the GMCP card escapes and frames outbound state"
    security: "safely decode an untrusted Telnet stream so an injected subnegotiation cannot corrupt the parsed command or a password"
    government: "speak Telnet to a legacy device or terminal server without a heavyweight dependency, framing bytes correctly"
    finance: "frame an out-of-band structured feed alongside a legacy line-based Telnet session"
    general: "any Telnet gateway, client, or option (GMCP, MSDP, NAWS) that must escape, strip, or negotiate IAC without desyncing"

- id: zone-scheduler
  name: Zone Scheduler
  source: parts/zones.py
  category: scheduling
  tags: [areas, regions, tick, cadence, scheduler, legacy-mud]
  maturity: prototype
  source_status: clean-room
  provenance: >-
    Area/zone grouping + reset cadence, a mechanism common to the MUD tradition and best
    documented in the Diku/Circle/tbaMUD family (license class B, LGPL). Studied clean-room from
    public behavior (research/legacy_muds/behavior_specs/zone_reset.md); no historical code,
    comments, names, or structure copied. Original beat-driven Python, made to honor CodeForge's
    "the tick is the only clock" law. The repop action is deferred by design (see parts/zones.py).
  license: MIT
  influence: "MUD zone/area reset (Diku family) - grouping + cadence on a logical tick (clean-room reimplementation)"
  experimental: >-
    land the repop action once the model is decided (object instancing for item restock, a
    resettable-vs-quest-permanent flag for doors, and whether felled NPCs stay down), and track
    per-area occupancy through a real session registry instead of the acting-player proxy. Traded
    away (v1): any world mutation, keeping the scheduler and grouping provable and safe first.
  risk: low
  purpose: >
    Group rooms into named areas over the flat world graph, and advance each area's reset clock on
    the world beat (the same single clock aggression uses, no background thread): when an area
    reaches its cadence under its reset_mode (never / empty_only / always) it comes due. Grouping
    and the beat-driven scheduler are proven; the repopulation action is a deferred seam.
  reuse:
    game: "areas group rooms and show an area banner; the scheduler marks an area due to refill on the world beat"
    general: "a single-clock periodic scheduler: advance recurring work off one logical beat, no background thread or wall-clock timer"
    compliance: "a cadence tracker - flag a grouped resource 'due for review' after N beats/events, mirroring the guidance library's stale-past-cadence doctor"

- id: delay-queue
  name: Hourglass
  source: parts/hourglass.py
  category: scheduling
  tags: [timer, delay, queue, tick, scheduler, legacy-mud]
  maturity: beta
  source_status: clean-room
  provenance: >-
    The MUD "event queue" / delayed-action mechanism (the Diku/Merc event system; Erwin
    Andreasen's public-domain event snippet, reused across the tradition, e.g. Aardwolf) -
    license class A, public-domain lineage. Studied clean-room from public behavior
    (research/legacy_muds/behavior_specs/delayed_event_queue.md); no historical code, comments,
    names, or structure copied. Original Python, made to honor "the tick is the only clock" (it
    never runs itself; the caller advances it).
  license: MIT
  influence: "MUD delayed-event queue (Diku/Merc event system) - fire a payload after N ticks (clean-room reimplementation)"
  experimental: >-
    a hashed timer wheel for very large horizons (O(1) advance instead of the O(n) per-beat scan);
    today the linear scan is simplest and fast at game scale. Traded away (v1): sub-linear advance.
  risk: low
  purpose: >
    A beat-driven delay queue: schedule a labelled payload to fire after N beats (or every N),
    advance one beat at a time, and collect what came due. It never runs itself - the caller's
    clock advances it (the world beat in-engine, no background thread), so deferred work rides one
    logical clock. Bounded against a scheduling denial-of-service.
  reuse:
    game: "fire a deferred effect on the world beat - a self-closing door relocks, a status wears off, an area resets"
    general: "a tick-driven timer wheel / delay queue: run deferred work off one logical clock with no threads or wall-clock timers (retry-after, timeouts, TTL expiry, debounce)"
    records: "decrement a review or retention countdown each processing cycle and fire the follow-up when it comes due"

- id: weighted-table
  name: Weighted Table
  source: parts/weighted_table.py
  category: sampling
  tags: [loot, spawn, weighted, random, sampling, legacy-mud]
  maturity: shipped
  source_status: original
  license: MIT
  influence: "the MUD loot/spawn table (Diku/Merc lineage) - textbook weighted random selection, original implementation"
  experimental: >-
    an alias-method table for O(1) draws at very large N (today's cumulative walk is O(n), fine at
    loot-table scale), or reservoir sampling for a streamed distribution. Traded away (v1): the
    simplest correct thing over premature optimization.
  risk: low
  purpose: >
    Pick one outcome from a fixed set, proportional to integer weights, using a caller-injected
    random.Random so the draw is reproducible under a seed. The loot/spawn table the game needs, and
    a generic weighted choice for anything else - it never owns its own randomness.
  reuse:
    game: "a defeated foe's weighted loot roll, a weighted spawn or random encounter (combat injects a seedable RNG so tests stay exact)"
    general: "any weighted choice from a fixed distribution with a reproducible, seedable draw - A/B bucketing, sampled test inputs, spreading load across weighted backends"
    finance: "sample a transaction/account population by weighted stratum for a reproducible audit spot-check"
