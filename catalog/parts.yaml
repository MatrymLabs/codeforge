# CodeForge Hardware Catalog - reusable parts across domains.
#
# One well-made part, many jobs. Each entry documents where the same engine
# code serves outside the game. Schema + rules: catalog/README.md.
# View it: `make hardware`. Validated by parts/hardware.py (fails loud on a bad row).

- id: rank-gate
  name: Rank Gate
  source: parts/ranks.py
  category: authorization
  tags: [rbac, permissions, security, governance]
  maturity: shipped
  source_status: original
  license: MIT
  influence: "RBAC - authorization-before-capability pattern (original implementation)"
  risk: low
  reuse_score: 5
  purpose: >
    Authorization before capability: check an actor's rank against the rank a
    privileged action requires, and refuse before any of that action's code runs.
  reuse:
    game: "@-verbs gate on wizard/owner rank before they touch the world"
    government: "records access by clearance level; who may release a document"
    finance: "approval authority tiers - who may sign off an AP/AR transaction"
    compliance: "least-privilege enforcement, with the refusal as evidence"
    general: "role-based access control (RBAC) for any command surface"

- id: event-ledger
  name: Event Ledger
  source: parts/events.py
  category: messaging
  tags: [events, audit, fan-out, resilience]
  maturity: shipped
  source_status: original
  license: MIT
  influence: "publish/subscribe (observer) pattern (original implementation)"
  risk: low
  reuse_score: 5
  purpose: >
    Fan an event out to many subscribers, isolating failures: one dead or slow
    consumer can never fault the producer, and a raising sink is pruned.
  reuse:
    game: "broadcast room events (arrivals, speech) to every player present"
    government: "an append-only audit trail of who did what, when"
    finance: "a financial transaction / posting history feed"
    compliance: "a security-event log that survives a failing downstream sink"
    general: "a resilient pub/sub notification relay"

- id: validated-loader
  name: Validated Loader
  source: parts/seed.py
  category: data-integrity
  tags: [validation, schema, config, fail-loud]
  maturity: shipped
  source_status: original
  license: MIT
  influence: "fail-loud validation at the boundary (original implementation)"
  risk: low
  reuse_score: 4
  purpose: >
    Load external data (YAML) through a schema gate so bad states are
    unrepresentable: a malformed row fails loud at load, not deep in a run.
  reuse:
    game: "load and validate seed worlds (rooms/items/npcs) before boot"
    government: "validate a records schema or control registry on ingest"
    finance: "validate a chart-of-accounts / vendor file before posting"
    compliance: "reject a malformed control/source registry row at the door"
    general: "typed config loading with early, loud validation"

- id: safe-runner
  name: Failsafe Runner
  source: parts/console.py
  category: security
  tags: [allowlist, subprocess, sandbox, governance]
  maturity: shipped
  source_status: original
  license: MIT
  influence: "command allowlist + subprocess without a shell, shell=False (original implementation)"
  risk: low
  reuse_score: 5
  purpose: >
    Run only allowlisted commands as argument lists (never a shell), in a fixed
    directory, under a timeout and an output cap, with each run logged. Unknown
    input is refused and never executes.
  reuse:
    game: "the Workshop's in-world diagnostic console (run lint/tests/git safely)"
    government: "a controlled command surface for a records/workflow operator"
    finance: "a gated task runner for AP/AR jobs - no arbitrary execution"
    compliance: "safe, logged command execution as an auditable control"
    general: "a sandboxed command relay for any untrusted-caller automation"

