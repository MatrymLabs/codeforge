  reuse_score: 4
  purpose: >
    Choose among options honestly: a candidate that fails a hard gate cannot win, and only then
    do weighted objectives produce an overall score. Every raw and normalized metric stays
    visible, so no single number hides the components.
  reuse:
    business: "a multi-criteria decision with visible weights and non-negotiable gates"
    government: "score options where some criteria are pass/fail and others are weighted"
    general: "rank candidates by hard gates then transparent weighted objectives"

