  tags: [database, sqlalchemy, postgresql, sqlite, alembic, migrations]
  maturity: shipped
  source_status: original
  license: MIT
  influence: "the repository/adapter seam over an ORM; one URL resolver picks the backend (SQLAlchemy; adopted)"
  experimental: >-
    an ORM welded to one database, or raw SQL per driver. Traded away: a single seam
    that runs SQLite in dev and tests and PostgreSQL in production, unchanged, with Alembic
