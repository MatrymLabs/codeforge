- id: report-writer
  name: Report Writer
  source: parts/reporting.py
  category: evidence
  tags: [reporting, evidence, audit-trail, filing, reuse]
  maturity: shipped
  source_status: original
  license: MIT
  influence: "dated evidence-report pattern - one writer, one convention (original implementation)"
  experimental: >-
    render with Jinja2 templates and style via rich (or reportlab /
    WeasyPrint for PDF), or emit structured events (structlog) to a document store
    instead of Markdown files. Traded away: greppable plain text, diffable in git.
  risk: low
  reuse_score: 4
  purpose: >
    One writer for dated evidence reports: file any text under reports/<category>/ with a
    consistent dated-path convention, so every producer files the same way. In-repo it is
    already reused by two consumers (the repo-integrity report and the `inspect save`
    frame-up snapshot) - one seam, not three ad-hoc writers.
  reuse:
    game: "banks frame-up snapshots and repo-integrity health reports under reports/"
    government: "dated evidence/audit-trail reports, filed consistently and traceable"
    finance: "dated transaction or reconciliation evidence, one filing convention"
    compliance: "dated evidence bundles under a category, reproducible from the commit"
    general: "any project's dated report/evidence writer - stop reinventing the mkdir+path"

- id: typed-contract
  name: Typed API Contract
  source: parts/api.py
  category: api
  tags: [api, pydantic, openapi, contracts, validation]
  maturity: shipped
  source_status: original
  license: MIT
  influence: "typed request/response models with schema generation (Pydantic; a framework adopted because it earns its place)"
  experimental: >-
    hand-rolled dataclass validation with no schema or OpenAPI generation - the
    frameless path we declined here, because a documented contract a client can codegen
    from is worth the dependency. Traded away: zero third-party surface.
  risk: low
  reuse_score: 5
  purpose: >
    Expose data through typed Pydantic models so the contract validates at the edge and
    self-documents in OpenAPI: a client generates types from it, and a schema change surfaces
    as a compile error, not a runtime surprise. Proven by the React/TypeScript console.
  reuse:
    game: "the readiness board and blueprint list as typed JSON (/api/status, /api/blueprints)"
    government: "typed record exchange between systems, with a published schema"
    finance: "transaction request/response schemas validated at the boundary"
    compliance: "validated data contracts, the schema itself an evidence artifact"
    general: "any REST API contract a front end or partner consumes"

