- id: loader-cache
  name: Loader Cache
  source: parts/loader_cache.py
  category: caching
  tags: [cache, mtime, parse-once, io, performance]
  maturity: shipped
  source_status: original
  license: MIT
  influence: "mtime-guarded memoization (classic build-tool/loader pattern; independently implemented)"
  experimental: >-
